      number3: "0"
      label3: "Web2-платформ (Kickstarter, Planeta, Boomstarter) предоставляют поэтапный контроль расходования средств"

  # -------- Слайд 3: Текст_3 (цель и задачи) --------
  - layout: "Текст_3"
    placeholders:
      title: "Цель и задачи работы"
      main_text: |
        Разработать алгоритм и прототип краудфандинговой платформы на основе блокчейн-технологий, обеспечивающей прозрачность операций и поэтапный контроль расходования средств через механизм milestone-эскроу с голосованием инвесторов.

        Задачи сгруппированы в три блока: анализ предметной области (4 задачи), проектирование бизнес-процесса и архитектуры (4 задачи), реализация и оценка прототипа (2 задачи). Всего 10 задач.
      highlight_text: |
        Анализ
        1. Рынок Web2-краудфандинга
        2. Научная литература
        3. Систематизация проблем (Исикава)
        4. Стейкхолдеры (Mendelow)

        Проектирование
        5. AS-IS BPMN
        6. Требования (MoSCoW)
        7. TO-BE + верификация SPIN
        8. Алгоритм смарт-контрактов

        Реализация
        9. Архитектура и данные
        10. Прототип и оценка

  # -------- Слайд 4: Текст_2 (объект, предмет, методы, новизна) --------
  - layout: "Текст_2"
    placeholders:
      title: "Объект, предмет, методы, новизна"
      body: |
        Объект исследования — процесс коллективного инвестирования в проекты различного масштаба.

        Предмет исследования — краудфандинговая платформа, обеспечивающая прозрачность и безопасность операций через блокчейн-инфраструктуру и milestone-эскроу с голосованием инвесторов.

        Методы исследования: BPMN 2.0 (моделирование бизнес-процессов), диаграмма Исикавы (причинно-следственный анализ), матрица Mendelow (анализ стейкхолдеров), методология MoSCoW (приоритизация требований), model checker SPIN (формальная верификация моделей), прототипирование и сквозное тестирование информационной системы.

        Научная новизна работы заключается в разработке алгоритма краудфандинговой платформы, использующей смарт-контракты для реализации механизма milestone-эскроу с голосованием инвесторов. Такой механизм обеспечивает верифицируемую прозрачность и автоматический контроль расходования средств — недостижимый в рамках традиционных Web2-платформ.

  # -------- Слайд 5: Текст_1 (результаты глав 1-2) --------
  - layout: "Текст_1"
    placeholders:
      title: "Результаты: анализ и проектирование процесса"
      body: |
        Проведён анализ предметной области: сравнительный анализ 8 краудфандинговых платформ (Web2 и Web3), построена диаграмма Исикавы с выделением 5 категорий системных проблем, идентифицированы 4 группы стейкхолдеров по матрице Mendelow, сформулирована концепция целевого решения, покрывающая все 7 принципов Guggenberger (2023).

        Спроектированы модели AS-IS и TO-BE бизнес-процесса платформы в нотации BPMN 2.0 на двух уровнях детализации (Descriptive и Analytical по методологии Bruce Silver). В текущем Web2-процессе идентифицированы 5 системных узких мест, устранённых в TO-BE. Сформулированы 7 критериев целевой платформы, 12 функциональных требований по методологии MoSCoW и 10 нефункциональных требований. Выполнена формальная верификация TO-BE-модели через четырёхуровневый пайплайн (bpmnlint и model checker SPIN), подтвердившая её корректность.
      image_url: "https://raw.githubusercontent.com/artemdost/vkr-crowdfund-platform/main/thesis/diagrams/bpmn_renders/bpmn_to_be_l1.png"
      image_caption: "BPMN TO-BE, уровень L2 (Analytical)"

  # -------- Слайд 6: Таблица_2 (результаты главы 3) --------
  - layout: "Таблица_2"
    placeholders:
      title: "Результаты: архитектура и прототип"
      table_caption: "Сравнение характеристик платформы с Web2-аналогами"
      table:
        headers: ["Характеристика", "Web2", "Платформа", "Эффект"]
        rows:
          - ["Комиссия с успешной кампании", "5–15%", "1–3%", "снижение в 3–5 раз"]
          - ["Скорость расчётов с автором", "3–14 банковских дней", "1–14 секунд", "ускорение на 4 порядка"]
          - ["Прозрачность эскроу", "отсутствует", "100% on-chain", "аудит в любой момент"]
          - ["Ликвидность доли инвестора", "отсутствует", "ERC-1155 передаваем", "возможен вторичный рынок"]
          - ["Автоматизация контроля", "модерация вручную", "100% через смарт-контракт", "исключение человеческого фактора"]
      side_text: |
        Разработана гибридная двухслойная архитектура: Web2-интерфейс для пользователя и Web3-ядро со смарт-контрактами для финансовой логики.

        Реализована иерархия из трёх смарт-контрактов на Solidity 0.8.24: InvestToken (ERC-1155), FundFactory, CrowdFund. Атомарная разблокировка бюджета этапа происходит в той же транзакции, что и завершение голосования.

        Прототип покрыт unit-тестами на 94% по строкам и 88% по ветвям. Полный сквозной сценарий пройден успешно.

  # -------- Слайд 7: чистый (благодарность) --------
  - layout: "чистый"
    placeholders:
      main_text: "Спасибо за внимание"
      subtitle: "github.com/artemdost/vkr-crowdfund-platform"
