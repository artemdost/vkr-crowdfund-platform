      subtitle: "Автор: Достоев А. В. · 22БИ · Научный руководитель: к.т.н. Улитин Б. И. · 2026"

  # -------- Слайд 2: Цифры (актуальность) --------
  - layout: "Цифры"
    placeholders:
      title: "Актуальность"
      number1: "18.4 → 46.4"
      label1: "млрд долларов — рост глобального рынка краудфандинга к 2033 году при CAGR 10,8%"
      number2: "54"
